<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - SKT Gaming Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="dark-theme">

    <section class="auth-section d-flex align-items-center min-vh-100">
        <div class="container-fluid p-0">
            <div class="row g-0 auth-section__row">

                <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-end p-5 position-relative auth-section__banner" id="authBanner">
                    <div class="auth-section__banner-bg" id="authBannerBg"></div>
                    <div class="overlay position-absolute top-0 start-0 w-100 h-100"></div>
                    <div class="z-1 text-white mb-5">
                        <h1 class="display-3 fw-bold font-orbitron text-uppercase" style="text-shadow: 0 0 15px rgba(0, 255, 255, 0.5);">
                            Khôi Phục<br>Tài Khoản
                        </h1>
                        <p class="lead font-poppins mt-3">Đừng lo, chiến binh. Chúng tôi sẽ giúp bạn lấy lại quyền truy cập.</p>
                    </div>
                </div>

                <div class="col-lg-6 d-flex align-items-center justify-content-center p-4 p-sm-5 auth-section__content position-relative">

                    <a href="login.html" class="position-absolute top-0 end-0 m-4 text-decoration-none font-poppins btn-back">
                        <i class="fa-solid fa-arrow-left me-2"></i> TRỞ VỀ
                    </a>

                    <div class="auth-card">
                        <div class="text-center mb-4">
                            <div class="forgot-icon"><i class="fa-solid fa-key"></i></div>
                            <h2 class="auth-card__title">Quên Mật Khẩu</h2>
                            <p class="auth-card__subtitle mt-2">Nhập email đăng ký, chúng tôi sẽ gửi link đặt lại mật khẩu cho bạn.</p>
                        </div>

                        <form action="#" method="POST" class="auth-form font-poppins" id="forgotForm" onsubmit="return false;">

                            <div class="auth-field">
                                <span class="auth-field__icon"><i class="fa-regular fa-envelope"></i></span>
                                <input type="email" id="forgotEmail" class="auth-field__input" placeholder=" " required>
                                <label for="forgotEmail" class="auth-field__label">Email của bạn</label>
                            </div>

                            <div class="auth-msg" id="forgotMsg"></div>

                            <button type="submit" class="btn w-100 auth-form__btn-submit mb-4">
                                GỬI LINK ĐẶT LẠI
                            </button>

                            <div class="text-center font-poppins mt-2">
                                <a href="login.html" class="auth-form__register-link">Nhớ ra mật khẩu rồi? <span>Đăng nhập</span></a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
