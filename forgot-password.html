<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - SKT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="dark-theme auth-page">

    <!-- #region BACKGROUND -->
    <div class="auth-bg"></div>
    <!-- #endregion -->

    <!-- #region BRAND -->
    <a href="index.html" class="auth-brand">SKT</a>
    <!-- #endregion -->

    <!-- #region BACK LINK -->
    <a href="login.html"
       data-slide-to="login.html"
       data-transition="spin"
       class="auth-back">
        <i class="fa-solid fa-arrow-left me-2"></i>TRỞ VỀ ĐĂNG NHẬP
    </a>
    <!-- #endregion -->

    <!-- #region FORM FORGOT PASSWORD -->
    <div class="auth-wrap auth-wrap--right">
        <div id="authPanel" class="auth-panel">
            <div class="auth-card">

                <div class="text-center mb-4">
                    <div class="forgot-icon"><i class="fa-solid fa-key"></i></div>
                    <h2 class="auth-card__title">Quên Mật Khẩu</h2>
                    <p class="auth-card__subtitle mt-2">Nhập email đăng ký, chúng tôi sẽ gửi link đặt lại mật khẩu.</p>
                </div>

                <form id="forgotForm" action="#" method="POST" class="auth-form font-poppins" onsubmit="return false;">

                    <div class="auth-field">
                        <span class="auth-field__icon"><i class="fa-regular fa-envelope"></i></span>
                        <input type="email" id="forgotEmail" class="auth-field__input" placeholder=" " required>
                        <label for="forgotEmail" class="auth-field__label">Email của bạn</label>
                    </div>

                    <div class="auth-msg" id="forgotMsg"></div>

                    <button type="submit" class="btn w-100 auth-form__btn-submit mb-4">GỬI LINK ĐẶT LẠI</button>

                    <div class="text-center font-poppins">
                        <a href="login.html"
                           data-slide-to="login.html"
                           data-transition="spin"
                           class="auth-form__register-link">
                            Nhớ ra mật khẩu rồi? <span>Đăng nhập</span>
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
    <!-- #endregion -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
