<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - SKT Gaming Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="dark-theme">

    <section class="auth-section">
        <div class="container-fluid p-0">
            <div class="row g-0 auth-section__row">
                
                <div class="col-lg-7 d-none d-lg-block auth-section__banner">
                    <div class="auth-section__secure-text">
                        <small>SECURE CONNECTION ESTABLISHED • ENCRYPTION LEVEL MAXIMUM</small>
                    </div>
                </div>

                <div class="col-lg-5 auth-section__content d-flex align-items-center justify-content-center">
                    
                    <div class="auth-card">
                        <div class="text-center mb-4">
                            <h1 class="auth-card__title">CHÀO MỪNG TRỞ LẠI</h1>
                            <p class="auth-card__subtitle">Truy cập vào trung tâm điều khiển của bạn.</p>
                        </div>

                        <form class="auth-form" action="#" method="POST">
                            <div class="mb-4 auth-form__group">
                                <label for="email" class="form-label auth-form__label">EMAIL</label>
                                <div class="input-group">
                                    <span class="input-group-text auth-form__icon"><i class="fa-regular fa-envelope"></i></span>
                                    <input type="email" class="form-control auth-form__input" id="email" placeholder="commander@skt.gg" required>
                                </div>
                            </div>

                            <div class="mb-4 auth-form__group">
                                <label for="password" class="form-label auth-form__label">MẬT KHẨU</label>
                                <div class="input-group">
                                    <span class="input-group-text auth-form__icon"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" class="form-control auth-form__input" id="password" placeholder="••••••••" required>
                                    <span class="input-group-text auth-form__icon-toggle" id="togglePassword" style="cursor: pointer;">
                                        <i class="fa-regular fa-eye-slash"></i>
                                    </span>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check auth-form__check">
                                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">Ghi nhớ tôi</label>
                                </div>
                                <a href="#" class="auth-form__forgot-link">Quên mật khẩu?</a>
                            </div>

                            <button type="submit" class="btn auth-form__btn-submit w-100 mb-4">ĐĂNG NHẬP</button>

                            <div class="auth-form__divider d-flex align-items-center mb-4">
                                <hr class="flex-grow-1">
                                <span class="mx-3 text-muted">HOẶC KẾT NỐI VỚI</span>
                                <hr class="flex-grow-1">
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-6">
                                    <button type="button" class="btn auth-form__btn-social w-100">
                                        <i class="fa-brands fa-google me-2" style="color: #ea4335;"></i> Google
                                    </button>
                                </div>
                                <div class="col-6">
                                    <button type="button" class="btn auth-form__btn-social w-100">
                                        <i class="fa-brands fa-facebook me-2" style="color: #1877f2;"></i> Facebook
                                    </button>
                                </div>
                            </div>

                            <div class="text-center mt-3">
                                <a href="register.html" class="auth-form__register-link">Chưa có tài khoản? <span>Đăng ký ngay</span></a>
                            </div>
                        </form>
                    </div>
@code nhu cac
                </div>
            </div>
        </div>
    </section>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
